# Ray DPO training configuration
#
# Usage:
#   python -m swift.ray.megatron.orchestrator \
#       --config examples/megatron/rlhf/dpo/ray.yaml
#
# Structure:
#   - Top-level keys: shared config (dataset, batch size, etc.)
#   - train:/ref: sections: per-group config (model, parallelism, etc.)
#   - colocate_groups: groups sharing the same GPUs (optional)
#
# Each group section is independent - no inheritance or override logic.
# Missing keys use MegatronRLHFArguments defaults.

rlhf_type: dpo

# --- Shared config (applied to all groups) ---
dataset: AI-ModelScope/zhihu_rlhf_3k
micro_batch_size: 2
global_batch_size: 16
num_train_epochs: 1
logging_steps: 1
beta: 0.1
seed: 42

# --- Colocate config (optional) ---
# Uncomment to colocate train and ref on the same GPUs:
# colocate_groups: [[train, ref]]

# --- Group configs ---
train:
  model: Qwen/Qwen3-8B
  gpus: 4
  train_type: full
  pipeline_model_parallel_size: 2
  tensor_model_parallel_size: 2
  finetune: true
  cross_entropy_loss_fusion: true
  lr: 1e-5
  lr_warmup_fraction: 0.05
  min_lr: 1e-6
  sequence_parallel: true
  attention_backend: flash

ref:
  model: Qwen/Qwen3-8B
  gpus: 4
  pipeline_model_parallel_size: 1
  tensor_model_parallel_size: 2
